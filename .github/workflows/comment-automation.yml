name: Comment Automation (Faculty Verification)

on:
  issue_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  verification-detection:
    runs-on: ubuntu-latest

    steps:
      - name: Detect faculty verification comment
        uses: actions/github-script@v7
        with:
          script: |
            const comment = context.payload.comment.body.toLowerCase();
            const issue = context.payload.issue;

            // Ensure it's a PR (not a normal issue)
            if (!issue.pull_request) {
              console.log("Skipping: comment is on an issue, not a PR.");
              return;
            }

            console.log(`Comment received on PR #${issue.number}: "${context.payload.comment.body}"`);

            // Check for verification phrase
            if (!comment.includes("project reviewed by")) {
              console.log('Skipping: comment does not contain "project reviewed by".');
              return;
            }

            const prNumber = issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Ensure the "verified" label exists, create it if not
            try {
              await github.rest.issues.getLabel({ owner, repo, name: "verified" });
            } catch (e) {
              if (e.status === 404) {
                console.log('Label "verified" not found — creating it.');
                await github.rest.issues.createLabel({
                  owner, repo, name: "verified", color: "0075ca",
                  description: "Project verified by faculty"
                });
              } else {
                throw e;
              }
            }

            // 🏷️ Add "verified" label
            await github.rest.issues.addLabels({
              issue_number: prNumber,
              owner,
              repo,
              labels: ["verified"]
            });
            console.log(`Label "verified" added to PR #${prNumber}.`);

            // 💬 Confirmation comment
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner,
              repo,
              body: "✅ Project marked as **Verified** by faculty. Forwarding for final merge to the maintainer @abdulvasay-234."
            });
            console.log("Confirmation comment posted.");
